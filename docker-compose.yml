services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - energy-net

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - energy-net

  simulator:
    build: ./simulator
    container_name: tetouan-simulator
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      TOPIC_METERS: smart_meter_readings
      TOPIC_DISTRIBUTORS: distributor_aggregations
      TOPIC_CONCENTRATORS: district_aggregations
      CYCLE_DURATION_SECONDS: 900
      METER_PHASE_SECONDS: 840
      TOTAL_METERS: 91000
      TOTAL_DISTRIBUTORS: 681
    networks:
      - energy-net

  weather-producer:
    build: ./weather_producer
    container_name: weather-producer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      WEATHER_TOPIC: weather_data
      CITY: Tetouan
      WEATHER_INTERVAL_SECONDS: 60
    networks:
      - energy-net

  rss-producer:
    build: ./rss_producer
    container_name: rss-producer
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      RSS_TOPIC: rss_industrial_news
      CITY: Tetouan
      RSS_INTERVAL_SECONDS: 90
    networks:
      - energy-net

  kafka-to-mongo-consumer:
    build: ./consumers
    container_name: kafka-to-mongo-consumer
    depends_on:
      - kafka
      - mongodb
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      MONGO_URI: mongodb://mongodb:27017/
      DB_NAME: energy_project
      TOPIC_METERS: smart_meter_readings
      TOPIC_DISTRIBUTORS: distributor_aggregations
      TOPIC_CONCENTRATORS: district_aggregations
      CONCENTRATORS_PER_CYCLE: 18
      DELETE_RAW_AFTER_COMPLETION: "true"
      CLEANUP_DELAY_SECONDS: 10
    networks:
      - energy-net

  spark-master:
    image: spark:3.5.6-python3
    container_name: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - energy-net

  spark-worker:
    image: spark:3.5.6-python3
    container_name: spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
    networks:
      - energy-net

  spark-streaming-job:
    build: ./spark_jobs
    container_name: spark-streaming-job
    depends_on:
      - kafka
      - mongodb
      - spark-master
      - spark-worker
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:29092
      KAFKA_TOPIC_METERS: smart_meter_readings
      WEATHER_TOPIC: weather_data
      RSS_TOPIC: rss_industrial_news
      MONGO_URI: mongodb://mongodb:27017/
      DB_NAME: energy_project
      SPARK_MASTER_URL: spark://spark-master:7077
      EXPECTED_DISTRICTS: 18
      EXPECTED_METERS: 91000
    networks:
      - energy-net

  analytics-job:
    build: ./analytics_job
    container_name: analytics-job
    depends_on:
      - mongodb
      - spark-streaming-job
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      DB_NAME: energy_project
      ANALYTICS_INTERVAL_SECONDS: 120
      MIN_ML_ROWS: 36
      MIN_NLP_ROWS: 10
    networks:
      - energy-net

  dashboard:
    build: ./dashboard
    container_name: energy-dashboard
    depends_on:
      - mongodb
      - spark-streaming-job
      - analytics-job
    ports:
      - "8501:8501"
    environment:
      MONGO_URI: mongodb://mongodb:27017/
      DB_NAME: energy_project
    networks:
      - energy-net

volumes:
  mongo_data:

networks:
  energy-net:
    driver: bridge
